<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mini Golf - Course Preview</title>
  <style>
    body {
      background: #1a1a2e;
      color: #ddd;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      padding: 20px;
      margin: 0;
    }
    h1 {
      color: #4ecdc4;
      margin: 0 0 6px 0;
    }
    .subtitle {
      color: #888;
      margin-bottom: 16px;
    }
    .toolbar {
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toolbar button {
      background: #4ecdc4;
      color: #14202b;
      border: 0;
      border-radius: 6px;
      padding: 8px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .toolbar button:hover { background: #6fdbd2; }
    .status { color: #888; font-size: 13px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(540px, 1fr));
      gap: 24px;
    }
    .card {
      background: #2d2d3f;
      padding: 14px 16px 16px;
      border-radius: 10px;
      border: 1px solid #3a3a4f;
    }
    .title {
      font-size: 17px;
      color: #fff;
      margin-bottom: 4px;
    }
    .meta {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
    }
    canvas {
      background: #0a3a1a;
      display: block;
      border: 1px solid #1a1a2e;
      border-radius: 4px;
      width: 100%;
      height: auto;
    }
    .legend {
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .lg-tee::before { background: #4ecdc4; }
    .lg-hole::before { background: #000; border: 1px solid #fff; }
    .lg-bumper::before { background: #e84d8a; }
    .lg-magnet::before { background: rgba(255, 80, 80, 0.7); border: 1px solid #ff5555; }
    .lg-magnet-push::before { background: rgba(80, 80, 255, 0.7); border: 1px solid #5555ff; }
    .lg-sand::before { background: #c9a875; border-radius: 0; }
    .lg-water::before { background: #3a7fc0; border-radius: 0; }
    .lg-slope::before { background: rgba(120, 200, 120, 0.4); border-radius: 0; }
    .lg-speed::before { background: rgba(255, 200, 0, 0.5); border-radius: 0; }
    .lg-gate::before { background: #bb55ff; border-radius: 0; height: 4px; margin-top: 4px; }
    .lg-tele::before { background: #00ffff; }
  </style>
</head>
<body>
  <h1>Mini Golf - Course Preview</h1>
  <div class="subtitle">All 9 courses, rendered live from <code>js/courses.js</code>. Edits to the source show up on refresh.</div>
  <div class="toolbar">
    <button id="download-all" type="button">Download all as PNGs</button>
    <span id="download-status" class="status"></span>
  </div>
  <div id="grid" class="grid"></div>
  <div class="legend">
    <span class="lg-tee">Tee</span>
    <span class="lg-hole">Hole</span>
    <span class="lg-bumper">Bumper</span>
    <span class="lg-magnet">Magnet (pull)</span>
    <span class="lg-magnet-push">Magnet (push)</span>
    <span class="lg-sand">Sand</span>
    <span class="lg-water">Water</span>
    <span class="lg-slope">Slope</span>
    <span class="lg-speed">Speed pad</span>
    <span class="lg-gate">One-way gate</span>
    <span class="lg-tele">Teleporter</span>
  </div>
  <script type="module" src="./preview.js"></script>
</body>
</html>
